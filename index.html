<!DOCTYPE html>
<html>
<head>
    <title>NTEP Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body style="text-align:center; font-family:Arial;">

    <h2>NTEP Certificate Generator</h2>

    <input type="text" id="name" placeholder="Enter Name"><br><br>
    <input type="date" id="date"><br><br>

    <button onclick="generateCertificate()">Download Certificate</button>

    <script>
        async function generateCertificate() {
            const { jsPDF } = window.jspdf;

            let name = document.getElementById("name").value;
            let date = document.getElementById("date").value;

            if (!name || !date) {
                alert("Please enter both Name and Date");
                return;
            }

            const pdf = new jsPDF('landscape', 'px', [842, 595]);

            let img = new Image();

            img.onload = function () {
                pdf.addImage(img, 'JPEG', 0, 0, 842, 595);

                pdf.setTextColor(0, 0, 255);

                pdf.setFont("Times", "Bold");
                pdf.setFontSize(28);
                pdf.text(name, 421, 285, { align: "center" });

                pdf.setFontSize(18);
                pdf.text(date, 500, 355);

                pdf.save(name + "_certificate.pdf");
            };

            img.onerror = function () {
                alert("Image not found! Check file name/path.");
            };

            img.src = "certificate.jpg";
        }
    </script>

</body>
</html>
